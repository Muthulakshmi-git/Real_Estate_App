

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
   <!-- Tailwind css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <style>
        @keyframes fade-in {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes slide-up {
            from {
                transform: translateY(20px)
            }

            to {
                transform: translateY(0)
            }
        }

        .animate-fade-in {
            animation: fade-in 0.6s ease
        }

        .animate-slide-up {
            animation: slide-up 0.5s ease
        }
    </style>

</head>

  <body class="bg-gradient-to-r from-indigo-500 to-pink-500 min-h-screen flex items-center justify-center">


    <div class="bg-white p-8 rounded-xl shadow-xl w-96 animate-fade-in">
        <h2 class="text-2xl font-bold text-center mb-6 text-indigo-600">Login</h2>

        <input id="email" class="w-full mb-3 p-2 border rounded" placeholder="Email">
        <input id="password" type="password" class="w-full mb-4 p-2 border rounded" placeholder="Password">

        <button onclick="login()" class="w-full bg-indigo-600 text-white py-2 rounded hover:scale-105 transition">
            Login
        </button>
         <h1 class="text-gray-400 mt-5 inline-block">Don't have an account?</h1>
  <a class="ml-2" href="./register.html">Register</a>
    </div>

</body>
</html>



<script>
async function login() {
  const res = await fetch("http://localhost:5000/api/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  if (data.role === "agent") location.href = "agent-dashboard.html";
  if (data.role === "user") location.href = "user-properties.html";
  if (data.role === "admin") location.href = "admin-dashboard.html";
}
</script>
