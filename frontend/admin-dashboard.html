<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin dashboard</title>
     <!-- Tailwind css -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>

<body class="bg-gradient-to-br from-blue-300 to-white min-h-screen p-6">

  <h2 class="text-4xl font-bold my-10 ">Admin Dashboard</h2>
  <h2 class="my-5 font-bold text-2xl text-red-500">Property Details</h2>
  <table cellpadding="10" class="w-full border">
    <thead class="bg-red-600 text-xl text-white">
      <tr class="border">
        <th>Title</th>
        <th>Price</th>
        <th>Address</th>
        <th>Agent Email</th>
        <th>Agent phone</th>
        <th>Images</th>
      </tr>
    </thead>
    <tbody id="rows" class="border"></tbody>
  </table>

  <!-- <h2 class="my-5 font-bold text-2xl text-red-500">Booking details</h2>
  <table cellpadding="10" class="w-full border">
    <thead class="bg-red-600 text-xl text-white">
      <tr class="border">
        <th>User Name</th>
        <th>User Email</th>
        <th>User Phone</th>
        <th>Reason</th>
        <th>Admin Email</th>
      </tr>
    </thead>
    <tbody id="row" class="border"></tbody>
  </table> -->
  <script>
    fetch("http://localhost:5000/api/properties")
      .then(res => res.json())
      .then(data => {
        rows.innerHTML = data.map(p => `
      <tr>
        <td class="border p-5">${p.title}</td>
        <td class="border p-5">₹${p.price}</td>
        <td class="border p-5">${p.address}</td>
        <td class="border p-5">${p.agentEmail}</td>
        <td class="border p-5">${p.agentPhone}</td>
        <td class="border p-5">${p.images.map(img => `
    <img src="http://localhost:5000/uploads/${img}" 
         class="h-20 w-20 object-cover mb-1 rounded"/>
  `).join("")}
</td>
      </tr>
    `).join("");
      });




      



  </script>

</body>

</html>
