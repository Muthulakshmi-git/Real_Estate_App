<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <!-- Tailwind css -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>

<body class="bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
    <h2 class="text-3xl font-bold text-center mb-6 text-purple-700">Register</h2>
    <form id="registerForm" onsubmit="register(event)" class="space-y-4">
      <input type="text" id="name" name="name" placeholder="Name" class="w-full p-3 rounded border border-gray-300"
        required>
      <input type="email" id="email" name="email" placeholder="Email" class="w-full p-3 rounded border border-gray-300"
        required>
      <input type="password" id="password" name="password" placeholder="Password"
        class="w-full p-3 rounded border border-gray-300" required>

      <select name="role" id="role" class="w-full p-3 rounded border border-gray-300" required>
        <option value="">Select Role</option>
        <option value="user">User</option>
        <option value="agent">Agent</option>
      </select>

      <button class="w-full bg-purple-600 text-white p-3 rounded hover:bg-purple-700 transition">Register</button>
    </form>
    <p class="mt-4 text-center text-gray-600">Already registered? <a href="login.html"
        class="text-purple-600 font-semibold">Login</a></p>
  </div>

  <script>
    async function register(e) {
      e.preventDefault();

      const response = await fetch("http://localhost:5000/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
          role: document.getElementById("role").value
        })
      });

      const data = await response.json();
      alert(data.msg);

      if (response.ok) {
        window.location.href = "login.html";
      }
    }
  </script>

</body>

</html>
